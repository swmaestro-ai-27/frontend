name: Claude PR Review

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: read
  id-token: write
  pull-requests: write

concurrency:
  group: claude-pr-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    name: Review pull request
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Claude PR review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: |
            Review this frontend pull request for correctness, maintainability, accessibility, and user-facing regressions.

            Focus on:
            - React/component state, rendering behavior, and data flow
            - API contract assumptions and error/loading states
            - accessibility, keyboard interaction, and responsive UI regressions
            - missing or weak tests for changed behavior

            Prioritize actionable bugs and risks. Leave inline comments only where a specific code location needs a change.
          claude_args: |
            --max-turns 40
